<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竞猜之王老头计算器</title>
<style>
    :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --danger: #ef4444;
        --danger-hover: #dc2626;
        --gold: #d97706;
        --gold-bg: #fef3c7;
        --purple: #7e22ce;
        --purple-bg: #f3e8ff;
        --red: #b91c1c;
        --red-bg: #fee2e2;
        --bg: #f3f4f6;
        --card-bg: #ffffff;
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --border: #e5e7eb;
    }

    body {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
        margin: 0;
        padding: 30px 20px;
        background-color: var(--bg);
        color: var(--text-main);
        line-height: 1.6;
    }

    .header-title {
        text-align: center;
        margin-bottom: 30px;
    }

    .header-title h2 {
        margin: 0 0 10px 0;
        font-size: 1.8rem;
        color: var(--text-main);
    }

    .header-title p {
        margin: 5px 0;
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    .container {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
        max-width: 1200px;
        margin: 0 auto;
    }

    .panel {
        background: var(--card-bg);
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        flex: 1;
        min-width: 320px;
        border: 1px solid var(--border);
    }

    .panel h3 {
        margin-top: 0;
        padding-bottom: 15px;
        border-bottom: 1px solid var(--border);
        color: var(--text-main);
        font-size: 1.2rem;
    }
    
    .input-section {
        margin-bottom: 20px;
    }

    label {
        display: flex;
        align-items: center;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 0.95rem;
    }

    label small {
        margin-left: 8px;
        font-weight: normal;
        color: var(--text-muted);
        font-size: 0.8rem;
    }

    input, select {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 1rem;
        box-sizing: border-box;
        transition: all 0.2s ease;
        background-color: #f9fafb;
        color: var(--text-main);
    }

    input:focus, select:focus {
        outline: none;
        border-color: var(--primary);
        background-color: #fff;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    select {
        margin-bottom: 10px;
        cursor: pointer;
    }

    .button-group {
        display: flex;
        gap: 12px;
        margin-top: 25px;
    }

    button {
        padding: 12px 20px;
        border: none;
        cursor: pointer;
        border-radius: 8px;
        flex: 1;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.2s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
    }

    .calculate-btn {
        background-color: var(--primary);
        color: white;
        box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
    }

    .calculate-btn:hover {
        background-color: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 4px 6px rgba(79, 70, 229, 0.4);
    }

    .clear-btn {
        background-color: white;
        color: var(--danger);
        border: 1px solid var(--danger);
    }

    .clear-btn:hover {
        background-color: var(--red-bg);
    }

    /* 结果面板及表格样式 */
    #result {
        animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 15px;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--border);
    }

    th, td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid var(--border);
        font-size: 0.95rem;
    }

    th {
        background-color: #f9fafb;
        font-weight: 600;
        color: var(--text-muted);
    }

    tr:last-child td {
        border-bottom: none;
    }

    tr:hover td {
        background-color: #f9fafb;
    }

    .result-section {
        margin-top: 25px;
    }

    .color-detail {
        padding: 16px;
        border-radius: 8px;
        margin-top: 15px;
        border-left: 4px solid transparent;
        font-size: 0.95rem;
    }

    .gold-detail { background-color: var(--gold-bg); border-left-color: var(--gold); }
    .purple-detail { background-color: var(--purple-bg); border-left-color: var(--purple); }

    .gold-text { color: var(--gold); font-weight: bold; }
    .purple-text { color: var(--purple); font-weight: bold; }
    .red-text { color: var(--red); font-weight: bold; }

    .badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 600;
    }
    
    .badge-red { background-color: var(--red-bg); color: var(--red); }
    .badge-gold { background-color: var(--gold-bg); color: var(--gold); }
    .badge-purple { background-color: var(--purple-bg); color: var(--purple); }

    .warning {
        background-color: #fffbeb;
        color: #b45309;
        padding: 12px;
        border-radius: 8px;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid #fef3c7;
    }

    .info {
        background-color: #eff6ff;
        color: #1d4ed8;
        padding: 16px;
        border-radius: 8px;
        text-align: center;
        font-weight: 500;
        border: 1px solid #dbeafe;
    }
</style>
</head>
<body>

<div class="header-title">
    <h2> 竞猜之王老头计算器</h2>
    <p>B站：PhS1liCon</p>
</div>

<div class="container">
    <div class="panel">
        <h3> 输入参数</h3>
        
        <div class="input-section">
            <label>总个数<small>(1-39之间)</small></label>
            <input type="number" id="total" min="1" max="39" value="10" placeholder="例如：10">
        </div>
        
        <div class="input-section">
            <label class="gold-text">金色</label>
            <select id="goldType">
		<option value="avg">优品均格</option>
                <option value="count">优品存量</option>
            </select>
            <input type="number" id="goldValue" placeholder="输入数值">
        </div>
        
        <div class="input-section">
            <label class="purple-text">紫色</label>
            <select id="purpleType">
		<option value="avg">优品均格</option>
                <option value="count">优品存量</option>
            </select>
            <input type="number" id="purpleValue"  placeholder="输入数值">
        </div>
        
        <div class="button-group">
            <button class="calculate-btn" onclick="calculate()">计算</button>
            <button class="clear-btn" onclick="clearAll()">清屏</button>
        </div>
    </div>
    
    <div class="panel" style="flex: 2;">
        <h3>计算结果</h3>
        <div id="result">
            <div style="text-align: center; color: #9ca3af; padding: 40px 0;">
                👈 请在左侧输入参数并点击“计算组合”
            </div>
        </div>
    </div>
</div>

<script>
// 计算均格值对应的所有可能（个数，总格数）组合
function getPossiblePairs(avgValue, maxCount = 20) {
    const pairs = [];
    
    for (let d = 1; d <= maxCount; d++) {
        const left = avgValue * d;
        const right = (avgValue + 0.01) * d;
        
        // 寻找区间内的整数N（总格数）
        const startN = Math.ceil(left);
        if (startN < right) {
            pairs.push({
                count: d,
                totalGrids: startN,
                actualAvg: (startN / d).toFixed(6)
            });
        }
    }
    
    return pairs;
}

function calculate() {
    const total = parseInt(document.getElementById("total").value);
    const goldType = document.getElementById("goldType").value;
    const goldValue = parseFloat(document.getElementById("goldValue").value);
    const purpleType = document.getElementById("purpleType").value;
    const purpleValue = parseFloat(document.getElementById("purpleValue").value);
    
    if (isNaN(total) || isNaN(goldValue) || isNaN(purpleValue)) {
        alert("请填写完整且有效的数值！");
        return;
    }
    
    let resultHTML = "";
    
    // ===== 1. 解析金色道具 =====
    let goldPossibilities = [];
    if (goldType === "count") {
        if (goldValue >= 0 && goldValue <= Math.min(20, total)) {
            goldPossibilities = [{ count: goldValue, totalGrids: null, actualAvg: null }];
            resultHTML += `<div class="color-detail gold-detail">
                <span class="badge badge-gold">金色</span> <strong>极品存量 = ${goldValue}</strong>
            </div>`;
        } else {
            resultHTML += `<p class="gold-text">金色个数 ${goldValue} 超过总数量 ${total} 或超出范围（0-${Math.min(20, total)}）</p>`;
            document.getElementById("result").innerHTML = resultHTML;
            return;
        }
    } else {
        goldPossibilities = getPossiblePairs(goldValue, Math.min(20, total));
        resultHTML += `<div class="color-detail gold-detail">
            <span class="badge badge-gold">金色</span> <strong>极品均格 = ${goldValue}</strong><br>
            <span style="color: #666; font-size: 0.9rem;">真实商范围：[${goldValue}, ${(goldValue + 0.01).toFixed(2)})</span><br>
            <table>
                <tr><th>金色个数</th><th>总格数</th><th>实际均格</th></tr>`;
        
        if (goldPossibilities.length === 0) {
            resultHTML += `<tr><td colspan="3" style="color:#999;">20以内无符合条件组合</td></tr>`;
        } else {
            goldPossibilities.forEach(p => {
                resultHTML += `<tr>
                    <td><strong>${p.count}</strong></td>
                    <td>${p.totalGrids}</td>
                    <td style="color: #666;">${p.actualAvg}</td>
                </tr>`;
            });
        }
        resultHTML += `</table></div>`;
    }
    
    // ===== 2. 解析紫色道具 =====
    let purplePossibilities = [];
    if (purpleType === "count") {
        if (purpleValue >= 0 && purpleValue <= Math.min(20, total)) {
            purplePossibilities = [{ count: purpleValue, totalGrids: null, actualAvg: null }];
            resultHTML += `<div class="color-detail purple-detail">
                <span class="badge badge-purple">紫色</span> <strong>优品存量 = ${purpleValue}</strong>
            </div>`;
        } else {
            resultHTML += `<p class="purple-text">紫色个数 ${purpleValue} 超过总数量 ${total} 或超出范围（0-${Math.min(20, total)}）</p>`;
            document.getElementById("result").innerHTML = resultHTML;
            return;
        }
    } else {
        purplePossibilities = getPossiblePairs(purpleValue, Math.min(20, total));
        resultHTML += `<div class="color-detail purple-detail">
            <span class="badge badge-purple">紫色</span> <strong>优品均格 = ${purpleValue}</strong><br>
            <span style="color: #666; font-size: 0.9rem;">真实商范围：[${purpleValue}, ${(purpleValue + 0.01).toFixed(2)})</span><br>
            <table>
                <tr><th>紫色个数</th><th>总格数</th><th>实际均格</th></tr>`;
        
        if (purplePossibilities.length === 0) {
            resultHTML += `<tr><td colspan="3" style="color:#999;">20以内无符合条件组合</td></tr>`;
        } else {
            purplePossibilities.forEach(p => {
                resultHTML += `<tr>
                    <td><strong>${p.count}</strong></td>
                    <td>${p.totalGrids}</td>
                    <td style="color: #666;">${p.actualAvg}</td>
                </tr>`;
            });
        }
        resultHTML += `</table></div>`;
    }
    
    // ===== 3. 组合计算 =====
    let finalCombinations = [];
    
    for (let g of goldPossibilities) {
        for (let p of purplePossibilities) {
            const redCount = total - g.count - p.count;
            
            if (
                redCount >= 0 && 
                redCount <= Math.min(20, total) &&
                g.count <= total &&
                p.count <= total
            ) {
                finalCombinations.push({
                    red: redCount,
                    gold: g.count,
                    purple: p.count,
                    goldGrids: g.totalGrids,
                    purpleGrids: p.totalGrids
                });
            }
        }
    }
    
    // ===== 4. 显示最终结果 =====
    resultHTML += `<div class="result-section">
        <h4 style="margin-bottom: 10px; font-size: 1.1rem;">最终物体个数组合</h4>
        `;
    
    if (finalCombinations.length === 0) {
        resultHTML += `<div style="text-align:center; padding: 20px; color: var(--danger); font-weight: bold;">未找到符合条件的组合</div>`;
    } else {
        resultHTML += `<table>
            <tr>
                <th><span class="badge badge-red">红色个数</span></th>
                <th><span class="badge badge-gold">金色个数</span></th>
                <th><span class="badge badge-purple">紫色个数</span></th>
                <th>金色总格数</th>
                <th>紫色总格数</th>
            </tr>`;
        
        finalCombinations.forEach(c => {
            resultHTML += `<tr>
                <td><strong>${c.red}</strong></td>
                <td><strong>${c.gold}</strong></td>
                <td><strong>${c.purple}</strong></td>
                <td style="color: var(--text-muted);">${c.goldGrids !== null ? c.goldGrids : '-'}</td>
                <td style="color: var(--text-muted);">${c.purpleGrids !== null ? c.purpleGrids : '-'}</td>
            </tr>`;
        });
        
        resultHTML += `</table>`;
    }
    
    resultHTML += `</div>`;
    
    document.getElementById("result").innerHTML = resultHTML;
}

// 清屏函数：恢复所有输入到初始状态
function clearAll() {
    document.getElementById("total").value = "10"; // 恢复默认值
    document.getElementById("goldType").selectedIndex = 0;
    document.getElementById("goldValue").value = "";
    document.getElementById("purpleType").selectedIndex = 0;
    document.getElementById("purpleValue").value = "";
    document.getElementById("result").innerHTML = `
        <div class="info">已清屏，请输入新参数并计算。</div>
    `;
}
</script>

</body>
</html>
